services:
  dashboard:
    build: .
    container_name: live_dashboard
    restart: unless-stopped
    environment:
      - PORT=3000
      - STATIC_DIR=/app/public
      - DB_PATH=/data/live-dashboard.db
      - DEVICE_TOKEN_1=${DEVICE_TOKEN_1}
      - DEVICE_TOKEN_2=${DEVICE_TOKEN_2}
    volumes:
      - dashboard_data:/data
    networks:
      dm_network:
        ipv4_address: 172.20.0.80
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  dashboard_data:

networks:
  dm_network:
    external: true
    name: dm_webserver_dm_network
